# project.yml
# XcodeGen project specification for Brief
# Install XcodeGen: brew install xcodegen
# Generate project: xcodegen generate

name: Brief
options:
  bundleIdPrefix: com.brief
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

# ─── Settings ───────────────────────────────────────────────────────────────

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_COMPILATION_MODE: wholemodule
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

# ─── Targets ─────────────────────────────────────────────────────────────────

targets:

  # ── iOS App ──────────────────────────────────────────────────────────────
  Brief:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: com.brief.app
    entitlements: Brief/Brief.entitlements
    info:
      path: Brief/Info.plist

    sources:
      - path: Brief
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: Shared
        group: Shared

    dependencies:
      - target: BriefWidget
        embed: true
        codeSign: true
      - target: BriefWatch
        embed: true
        codeSign: true

    settings:
      base:
        PRODUCT_NAME: Brief
        PRODUCT_BUNDLE_IDENTIFIER: com.brief.app
        INFOPLIST_FILE: Brief/Info.plist
        CODE_SIGN_ENTITLEMENTS: Brief/Brief.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Enable Foundation Models (Apple Intelligence) – iOS 26+
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  # ── Widget Extension ───────────────────────────────────────────────────────
  BriefWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: com.brief.app.widget
    entitlements: BriefWidget/BriefWidget.entitlements
    info:
      path: BriefWidget/Info.plist

    sources:
      - path: BriefWidget
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: Shared
        group: Shared

    settings:
      base:
        PRODUCT_NAME: BriefWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.brief.app.widget
        INFOPLIST_FILE: BriefWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BriefWidget/BriefWidget.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  # ── Apple Watch App ────────────────────────────────────────────────────────
  BriefWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    bundleId: com.brief.watchapp
    entitlements: BriefWatch/BriefWatch.entitlements
    info:
      path: BriefWatch/Info.plist

    sources:
      - path: BriefWatch
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: Shared
        group: Shared

    settings:
      base:
        PRODUCT_NAME: "Brief"
        PRODUCT_BUNDLE_IDENTIFIER: com.brief.watchapp
        INFOPLIST_FILE: BriefWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: BriefWatch/BriefWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

# ─── Schemes ─────────────────────────────────────────────────────────────────

schemes:
  Brief:
    build:
      targets:
        Brief: all
        BriefWidget: [build]
        BriefWatch: [build]
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.CloudKitDebug": "0"
    test:
      config: Debug
      targets:
        - BriefTests
    profile:
      config: Release
    archive:
      config: Release

