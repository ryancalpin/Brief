# project.yml
# XcodeGen project specification for Voxa
# Install XcodeGen: brew install xcodegen
# Generate project: xcodegen generate

name: Voxa
options:
  bundleIdPrefix: com.brief
  deploymentTarget:
    iOS: "18.0"
    watchOS: "11.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug
  configs:
    Debug: debug
    Release: release

# ─── Settings ───────────────────────────────────────────────────────────────

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    ENABLE_BITCODE: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    SWIFT_COMPILATION_MODE: wholemodule
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    API_GATEWAY_URL: ""          # Override in Config.xcconfig for App Store builds
  configs:
    Debug:
      API_GATEWAY_URL: ""
    Release:
      API_GATEWAY_URL: ""

# ─── Targets ─────────────────────────────────────────────────────────────────

targets:

  # ── iOS App ──────────────────────────────────────────────────────────────
  Brief:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: com.ryancalpin.voxa
    entitlements:
      path: Brief/Brief.entitlements
    info:
      path: Brief/Info.plist
      properties:
        API_GATEWAY_URL: "$(API_GATEWAY_URL)"

    sources:
      - path: Brief
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: Shared
        group: Shared

    dependencies:
      - target: BriefWidget
        embed: true
        codeSign: true
      - target: BriefWatch
        embed: true
        codeSign: true

    settings:
      base:
        PRODUCT_NAME: Voxa
        PRODUCT_BUNDLE_IDENTIFIER: com.ryancalpin.voxa
        INFOPLIST_FILE: Brief/Info.plist
        CODE_SIGN_ENTITLEMENTS: Brief/Brief.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG"
          ENABLE_TESTABILITY: YES
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  # ── Widget Extension ───────────────────────────────────────────────────────
  BriefWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "18.0"
    bundleId: com.ryancalpin.voxa.widget
    entitlements:
      path: BriefWidget/BriefWidget.entitlements
    info:
      path: BriefWidget/Info.plist

    sources:
      - path: BriefWidget
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: Shared
        group: Shared

    settings:
      base:
        PRODUCT_NAME: VoxaWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.ryancalpin.voxa.widget
        INFOPLIST_FILE: BriefWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BriefWidget/BriefWidget.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  # ── Apple Watch App ────────────────────────────────────────────────────────
  BriefWatch:
    type: application
    platform: watchOS
    deploymentTarget: "11.0"
    bundleId: com.ryancalpin.voxa.watch
    entitlements:
      path: BriefWatch/BriefWatch.entitlements
    info:
      path: BriefWatch/Info.plist

    sources:
      - path: BriefWatch
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: Shared
        group: Shared

    dependencies:
      - target: BriefWatchWidget
        embed: true
        codeSign: true

    settings:
      base:
        PRODUCT_NAME: Voxa
        PRODUCT_BUNDLE_IDENTIFIER: com.ryancalpin.voxa.watch
        INFOPLIST_FILE: BriefWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: BriefWatch/BriefWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  # ── Apple Watch Widget Extension ───────────────────────────────────────────
  BriefWatchWidget:
    type: app-extension
    platform: watchOS
    deploymentTarget: "11.0"
    bundleId: com.ryancalpin.voxa.watch.widget
    entitlements:
      path: BriefWatchWidget/BriefWatchWidget.entitlements
    info:
      path: BriefWatchWidget/Info.plist

    sources:
      - path: BriefWatchWidget
        excludes:
          - "**/*.entitlements"
          - "**/*.plist"
      - path: Shared
        group: Shared

    settings:
      base:
        PRODUCT_NAME: VoxaWatchWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.ryancalpin.voxa.watch.widget
        INFOPLIST_FILE: BriefWatchWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: BriefWatchWidget/BriefWatchWidget.entitlements
        SKIP_INSTALL: YES
        APPLICATION_EXTENSION_API_ONLY: YES
        WATCHOS_DEPLOYMENT_TARGET: "11.0"
      configs:
        debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

# ─── Schemes ─────────────────────────────────────────────────────────────────

schemes:
  Brief:
    build:
      targets:
        Brief: all
        BriefWidget: [build]
        BriefWatch: [build]
        BriefWatchWidget: [build]
    run:
      config: Debug
      commandLineArguments:
        "-com.apple.CoreData.CloudKitDebug": "0"
    profile:
      config: Release
    archive:
      config: Release

# ─── Test Target ──────────────────────────────────────────────────────────────

BriefTests:
  type: bundle.unit-test
  platform: iOS
  deploymentTarget: "18.0"
  bundleId: com.ryancalpin.voxa.tests
  sources:
    - path: BriefTests
  dependencies:
    - target: Brief
  settings:
    base:
      TEST_HOST: $(BUILT_PRODUCTS_DIR)/Brief.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Brief
